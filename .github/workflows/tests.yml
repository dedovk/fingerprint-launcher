name: Tests

env:
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile application modules
        run: python -m compileall core services ui main.py build.py check_wbf.py

      - name: Test action engine and persistence
        run: >-
          python -X faulthandler -m pytest -ra
          tests/test_action_registry.py
          tests/test_action_runner.py
          tests/test_database.py
          tests/test_executor.py

      - name: Test platform services and localization
        run: >-
          python -X faulthandler -m pytest -ra
          tests/test_autostart.py
          tests/test_winbio.py
          tests/test_i18n.py

      - name: Test UI, picker, and themes
        run: >-
          python -X faulthandler -m pytest -ra
          tests/test_action_picker.py
          tests/test_theme.py
          tests/test_ui_integration.py
